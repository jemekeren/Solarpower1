<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Solar Control</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

button{
    padding:12px 20px;
    margin:5px;
    cursor:pointer;
}

input{
    padding:10px;
    margin:5px;
    width:250px;
}

.value{
    font-size:24px;
    font-weight:bold;
}

.green{
    color:green;
}

.red{
    color:red;
}
</style>
</head>

<body>

<h2>Solar Relay Dashboard</h2>

<p id="status">Not logged in</p>

<div id="loginBox" class="card">

<h3>Login</h3>

<input id="email" type="email" placeholder="Email"><br>

<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

</div>

<div id="dashboard" style="display:none;">

<div class="card">

<h3>Relay Control</h3>

<button onclick="setRelay('0')">
ON
</button>

<button onclick="setRelay('1')">
OFF
</button>

</div>

<div class="card">

<h3>Relay Status</h3>

<div id="relayStatus" class="value">
--
</div>

</div>

<div class="card">

<h3>AC Voltage</h3>

<div id="acVoltage" class="value">
N/A
</div>

</div>

<div class="card">

<h3>DC Voltage</h3>

<div id="dcVoltage" class="value">
N/A
</div>

</div>

<div class="card">

<button onclick="logout()">
Logout
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
  getDatabase,
  ref,
  set,
  onValue
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {

 apiKey: "AIzaSyAIU_4JrFj1bI3cRXMUNCwGhtiUr4eodBQ",
 authDomain: "solarcontrol-12668.firebaseapp.com",
 databaseURL: "https://solarcontrol-12668-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId: "solarcontrol-12668",
 storageBucket: "solarcontrol-12668.firebasestorage.app",
 messagingSenderId: "566361176566",
 appId: "1:566361176566:web:be3a4c901333c77a496fd7",

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

window.login = async () => {

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  try {

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

  } catch(err) {

    alert(err.message);

  }

};

window.logout = async () => {

  await signOut(auth);

};

window.setRelay = async (state) => {

  try {

    await set(
      ref(db,"command_switch"),
      state
    );

  } catch(err) {

    alert(err.message);

  }

};

onAuthStateChanged(auth,(user)=>{

  if(user){

    document.getElementById("status").innerText =
      "Logged in: " + user.email;

    document.getElementById("loginBox").style.display =
      "none";

    document.getElementById("dashboard").style.display =
      "block";

  }
  else{

    document.getElementById("status").innerText =
      "Not logged in";

    document.getElementById("loginBox").style.display =
      "block";

    document.getElementById("dashboard").style.display =
      "none";

  }

});

onValue(ref(db,"status_switch"),(snapshot)=>{

  const value = snapshot.val();

  const el =
    document.getElementById("relayStatus");

  if(value === "relay_on"){

    el.innerHTML =
      '<span class="green">RELAY ON</span>';

  }
  else if(value === "relay_off"){

    el.innerHTML =
      '<span class="red">RELAY OFF</span>';

  }
  else{

    el.innerText = "--";

  }

});

onValue(ref(db,"status_ac_voltage"),(snapshot)=>{

  const value = snapshot.val();

  document.getElementById("acVoltage").innerText =
    value ? value + " V" : "N/A";

});

onValue(ref(db,"status_dc_voltage"),(snapshot)=>{

  const value = snapshot.val();

  document.getElementById("dcVoltage").innerText =
    value ? value + " V" : "N/A";

});

</script>

</body>
</html>
