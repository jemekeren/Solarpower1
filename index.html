<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jim's Solar Control!</title>

<style>
body{
    font-family:Arial;
    max-width:900px;
    margin:auto;
    padding:20px;
    position:relative;
}

.main{
    max-width:600px;
}

.sysPanel{
    position:fixed;
    right:20px;
    top:20px;
    width:220px;
    border:1px solid #ddd;
    border-radius:10px;
    padding:12px;
    background:#f9f9f9;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.sysTitle{
    font-size:14px;
    font-weight:bold;
    margin-bottom:10px;
}

.sysItem{
    margin:8px 0;
    font-size:13px;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

button{
    padding:12px 18px;
    margin:5px;
    cursor:pointer;
}

input{
    padding:10px;
    margin:5px;
    width:250px;
}

.value{
    font-size:22px;
    font-weight:bold;
}

.green{color:green;}
.red{color:red;}

.small{
    font-size:12px;
    color:#666;
}

.error{
    color:red;
    padding:10px;
    background:#ffe6e6;
    border-radius:5px;
    margin:10px 0;
}
</style>
</head>

<body>

<h2>Jim's Solar Power Control System</h2>

<p id="status">Not logged in</p>

<div id="errorMsg" class="error" style="display:none;"></div>

<div class="main">

<div id="loginBox" class="card">

<h3>Login</h3>

<input id="email" type="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button id="loginBtn">Login</button>

</div>

<div id="dashboard" style="display:none;">

<div class="card">
<h3>Failover Mode: Automatic</h3>
<h4>Failover Trigger: Low Water Tank + City Power Outage </h4>
</div>

<div class="card">
<h3>Relay Status</h3>
<h3>Solar Power Manual Activation</h3>

<button id="onBtn">Start</button>
<button id="offBtn">Stop</button>

<div id="relayStatus" class="value">--</div>
</div>

<div class="card">
<h3>AC Voltage</h3>
<div id="acVoltage" class="value">N/A</div>
</div>

<div class="card">
<h3>DC Voltage</h3>
<div id="dcVoltage" class="value">N/A</div>
</div>

<div class="card">
<button id="logoutBtn">Logout</button>
</div>

</div>

</div>

<!-- SYSTEM MONITOR -->
<div class="sysPanel">
<div class="sysTitle">Controller</div>

<div class="sysItem">
CPU: <span id="cpuUsage">--</span>
</div>

<div class="sysItem">
MEM: <span id="memUsage">--</span>
</div>

<div class="sysItem">
UPTIME (sec): <span id="uptime">--</span>
</div>

</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
getDatabase,
ref,
set,
onValue
} 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

// Firebase config injected by GitHub Actions at build time
// Environment variables: VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN, etc.
const firebaseConfig = window.__FIREBASE_CONFIG__ || {
  apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
  authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
  databaseURL: import.meta.env.VITE_FIREBASE_DATABASE_URL,
  projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
  storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
  messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
  appId: import.meta.env.VITE_FIREBASE_APP_ID
};

// Check if config is valid
if (!firebaseConfig.apiKey) {
  const errorDiv = document.getElementById("errorMsg");
  errorDiv.textContent = "Error: Firebase configuration missing. Check environment variables.";
  errorDiv.style.display = "block";
  throw new Error("Firebase config not found");
}

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ... rest of the code remains the same ...

// ---------------- LOGIN ----------------

document.getElementById("loginBtn")
.addEventListener("click", async () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try {
await signInWithEmailAndPassword(auth, email, password);
} catch(err) {
alert(err.message);
}

});

// ---------------- LOGOUT ----------------

document.getElementById("logoutBtn")
.addEventListener("click", async () => {
await signOut(auth);
});

// ---------------- CONTROL ----------------

document.getElementById("onBtn")
.addEventListener("click", async () => {
await set(ref(db,"command_switch"), "0");
});

document.getElementById("offBtn")
.addEventListener("click", async () => {
await set(ref(db,"command_switch"), "1");
});

// ---------------- AUTH ----------------

onAuthStateChanged(auth,(user)=>{

if(user){
document.getElementById("status").innerText =
"Logged in: " + user.email;

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";
}
else{
document.getElementById("status").innerText="Not logged in";

document.getElementById("loginBox").style.display="block";
document.getElementById("dashboard").style.display="none";
}

});

// ---------------- RELAY STATUS ----------------

onValue(ref(db,"status_switch"),(snapshot)=>{

const v = snapshot.val();
const el = document.getElementById("relayStatus");

if(v === "relay_on"){
el.innerHTML = '<span class="green">RELAY ON</span>';
}
else if(v === "relay_off"){
el.innerHTML = '<span class="red">RELAY OFF</span>';
}
else{
el.innerText="--";
}

});

// ---------------- VOLTAGES ----------------

onValue(ref(db,"status_ac_voltage"),(snapshot)=>{
document.getElementById("acVoltage").innerText =
snapshot.val() ?? "N/A";
});

onValue(ref(db,"status_dc_voltage"),(snapshot)=>{
document.getElementById("dcVoltage").innerText =
snapshot.val() ?? "N/A";
});

// ---------------- SYSTEM RAW VALUES ----------------

onValue(ref(db,"cpu"),(snapshot)=>{
document.getElementById("cpuUsage").innerText =
snapshot.val() ?? "--";
});

onValue(ref(db,"mem"),(snapshot)=>{
document.getElementById("memUsage").innerText =
snapshot.val() ?? "--";
});

onValue(ref(db,"uptime"),(snapshot)=>{
document.getElementById("uptime").innerText =
snapshot.val() ?? "--";
});

</script>

</body>
</html>
