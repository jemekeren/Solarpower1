<!DOCTYPE html>
<html>
<head>
  <title>SolarPower1 Relay Control</title>
</head>

<body>

<h2>Solar Relay Dashboard</h2>

<!-- STATUS -->
<p id="status">Not logged in</p>

<hr>

<!-- LOGIN BOX -->
<div id="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- RELAY BOX (hidden initially) -->
<div id="relayBox" style="display:none;">
  <h3>Relay Control</h3>

  <button onclick="connectMQTT()">Connect MQTT</button>
  <button onclick="send('ON')">ON</button>
  <button onclick="send('OFF')">OFF</button>
</div>

<!-- MQTT LIB -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<!-- FIREBASE + AUTH -->
<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import { 
  getAuth, 
  signInWithEmailAndPassword, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

/* 🔴 YOUR FIREBASE CONFIG */
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCAPPjCvtuQ8gGgITH5gqcXBxlB0c9iU9E",
  authDomain: "solarpowercontrol-21a1c.firebaseapp.com",
  projectId: "solarpowercontrol-21a1c",
  storageBucket: "solarpowercontrol-21a1c.firebasestorage.app",
  messagingSenderId: "836080376430",
  appId: "1:836080376430:web:12bd6396690a6ff3cde47f",
  measurementId: "G-7FTQKBVP65"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN */
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (err) {
    alert("Login failed: " + err.message);
  }
};

/* AUTH STATE CONTROL UI */
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("status").innerText =
      "Logged in: " + user.email;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("relayBox").style.display = "block";

  } else {
    document.getElementById("status").innerText =
      "Not logged in";

    document.getElementById("loginBox").style.display = "block";
    document.getElementById("relayBox").style.display = "none";
  }
});

</script>

<!-- MQTT -->
<script>

let client;

/* CONNECT MQTT */
function connectMQTT() {
  client = mqtt.connect(
    "wss://672d4e9e82c440c19da1aa8491685a26.s1.eu.hivemq.cloud:8884/mqtt",
    {
      username: "Solarpower1",
      password: "Solarpower1",
      clean: true,
      connectTimeout: 4000
    }
  );

  client.on("connect", () => {
    alert("MQTT Connected");
  });

  client.on("error", (err) => {
    console.log("MQTT error:", err);
  });
}

/* SEND COMMAND */
function send(state) {
  if (!client || !client.connected) {
    alert("MQTT not connected");
    return;
  }

  client.publish("solarpanel/switch", state);
}

</script>

</body>
</html>
