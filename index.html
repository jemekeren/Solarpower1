<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jim's Solar Control!</title>

<style>
body{
    font-family:Arial;
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

button{
    padding:12px 18px;
    margin:5px;
    cursor:pointer;
}

input{
    padding:10px;
    margin:5px;
    width:250px;
}

.value{
    font-size:22px;
    font-weight:bold;
}

.green{color:green;}
.red{color:red;}
</style>
</head>

<body>

<h2>Jim's Solar Power Control!</h2>

<p id="status">Not logged in</p>

<div id="loginBox" class="card">

<h3>Login</h3>

<input id="email" type="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button id="loginBtn">Login</button>

</div>

<div id="dashboard" style="display:none;">

<div class="card">
<h3>Relay Control</h3>

<button id="onBtn">ON</button>
<button id="offBtn">OFF</button>

</div>

<div class="card">
<h3>Relay Status</h3>
<div id="relayStatus" class="value">--</div>
</div>

<div class="card">
<h3>Inverter AC OUTPUT Voltage to Jet Pump</h3>
<div id="acVoltage" class="value">N/A</div>
</div>

<div class="card">
<h3>DC Voltage Solar Charging Output / Battery Voltage</h3>
<div id="dcVoltage" class="value">N/A</div>
</div>

<div class="card">
<button id="logoutBtn">Logout</button>
</div>

</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
getDatabase,
ref,
set,
onValue
} 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyCAPPjCvtuQ8gGgITH5gqcXBxlB0c9iU9E",

authDomain: "solarpowercontrol-21a1c.firebaseapp.com",

databaseURL: "https://solarpowercontrol-21a1c-default-rtdb.asia-southeast1.firebasedatabase.app/",

projectId: "solarpowercontrol-21a1c",

storageBucket: "solarpowercontrol-21a1c.firebasestorage.app",

messagingSenderId: "836080376430",

appId: "1:836080376430:web:12bd6396690a6ff3cde47f"

};
console.log("Firebase app created");
    
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

console.log("App loaded");


// ---------------- LOGIN ----------------

document.getElementById("loginBtn")
.addEventListener("click", async () => {

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try {

await signInWithEmailAndPassword(auth, email, password);

} catch(err) {

alert(err.message);

}

});


// ---------------- LOGOUT ----------------

document.getElementById("logoutBtn")
.addEventListener("click", async () => {

await signOut(auth);

});


// ---------------- RELAY ON ----------------

document.getElementById("onBtn")
.addEventListener("click", async () => {

await set(ref(db,"command_switch"), "0");

});


// ---------------- RELAY OFF ----------------

document.getElementById("offBtn")
.addEventListener("click", async () => {

await set(ref(db,"command_switch"), "1");

});


// ---------------- AUTH STATE ----------------

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("status").innerText =
"Logged in: " + user.email;

document.getElementById("loginBox").style.display =
"none";

document.getElementById("dashboard").style.display =
"block";

}
else{

document.getElementById("status").innerText =
"Not logged in";

document.getElementById("loginBox").style.display =
"block";

document.getElementById("dashboard").style.display =
"none";

}

});


// ---------------- RELAY STATUS ----------------

onValue(ref(db,"status_switch"),(snapshot)=>{

const value = snapshot.val();

const el =
document.getElementById("relayStatus");

if(value === "relay_on"){

el.innerHTML =
'<span class="green">RELAY ON</span>';

}
else if(value === "relay_off"){

el.innerHTML =
'<span class="red">RELAY OFF</span>';

}
else{

el.innerText = "--";

}

});


// ---------------- AC VOLTAGE ----------------

onValue(ref(db,"status_ac_voltage"),(snapshot)=>{

const value = snapshot.val();

document.getElementById("acVoltage").innerText =
value ? value + " V" : "N/A";

});


// ---------------- DC VOLTAGE ----------------

onValue(ref(db,"status_dc_voltage"),(snapshot)=>{

const value = snapshot.val();

document.getElementById("dcVoltage").innerText =
value ? value + " V" : "N/A";

});

</script>

</body>
</html>
